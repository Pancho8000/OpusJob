<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Hoja de registro de feedback del prototipo</title>
  <desc id="desc">Plantilla de registro de feedback para relacionar observaciones cualitativas con resultados cuantitativos del proyecto OpusJob.</desc>
  <rect width="640" height="420" fill="#f7f8fc"/>
  <rect x="20" y="20" width="600" height="380" rx="16" fill="#ffffff" stroke="#d8dcef"/>
  <text x="40" y="55" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2a44">Hoja de registro de feedback</text>
  <text x="40" y="80" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#51607a">Proyecto: OpusJob / Ciclo de prototipado</text>

  <rect x="40" y="105" width="560" height="42" rx="8" fill="#eef3ff" stroke="#c9d7ff"/>
  <text x="55" y="130" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#26408b">Vinculo con resultados cuantitativos</text>
  <text x="55" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#44516b">Relacionar observacion, indicador medido y accion de refinamiento.</text>

  <rect x="40" y="165" width="560" height="32" fill="#27324a"/>
  <text x="52" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Fecha</text>
  <text x="120" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Escenario</text>
  <text x="250" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Hallazgo</text>
  <text x="410" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Indicador</text>
  <text x="505" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Accion</text>

  <rect x="40" y="197" width="560" height="42" fill="#fbfcff" stroke="#d8dcef"/>
  <text x="52" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">__/__/____</text>
  <text x="120" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">Prueba de usuario</text>
  <text x="250" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">Observacion del flujo</text>
  <text x="410" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">Tasa / ms</text>
  <text x="505" y="221" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">Refinar</text>

  <rect x="40" y="239" width="560" height="42" fill="#ffffff" stroke="#d8dcef"/>
  <rect x="40" y="281" width="560" height="42" fill="#fbfcff" stroke="#d8dcef"/>
  <rect x="40" y="323" width="560" height="42" fill="#ffffff" stroke="#d8dcef"/>

  <text x="40" y="390" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Tamano sugerido para documentacion: 640x420 px</text>
</svg>
